name: ci

on:
  push:
    paths: ["fabguard/**"]
  pull_request:
    paths: ["fabguard/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        working-directory: fabguard
        run: python -m unittest discover -s tests -v
      - name: Smoke-test the demo
        working-directory: fabguard
        run: python -m fabguard demo
