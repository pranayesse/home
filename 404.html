<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found · Pranay Mokida</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
  <style>
    .err-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .err-code { font-family: var(--mono); font-size: clamp(4rem, 15vw, 8rem); font-weight: 700; color: var(--accent); line-height: 1; }
    .err-msg { font-family: var(--mono); font-size: 0.85rem; color: var(--muted); margin: 1rem 0 2rem; }
    .err-term { background: var(--surface2); border-radius: 8px; padding: 1rem 1.5rem; font-family: var(--mono); font-size: 0.82rem; color: var(--muted); text-align: left; max-width: 420px; margin: 0 auto 2rem; }
    .err-term span { color: var(--accent); }
  </style>
</head>
<body>
<div class="err-page">
  <div>
    <div class="err-code">404</div>
    <h1 style="font-size:1.25rem;margin:.5rem 0;">Target Not Found</h1>
    <p class="err-msg">The page you're looking for doesn't exist or was moved.</p>
    <div class="err-term">
      <span>$</span> nmap pranaymokida.xyz/<br>
      <span style="color:var(--muted);">Host is up.</span><br>
      <span style="color:#f85149;">ERROR: Port 404 — host unreachable</span><br>
      <span>$</span> <span>Redirecting to base...</span>
    </div>
    <a href="index.html" class="btn btn-primary">Return to Base</a>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
