  </div>
</div>

<script src="blog-data.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug || typeof BLOG_POSTS === 'undefined') {
    document.getElementById('post-title').textContent = 'Post not found';
    document.getElementById('post-body').innerHTML = '<p>The requested post could not be found. <a href="blog.html">Return to blog</a>.</p>';
    return;
  }

  const idx = BLOG_POSTS.findIndex(p => p.slug === slug);
  const post = BLOG_POSTS[idx];

  if (!post) {
    document.getElementById('post-title').textContent = 'Post not found';
    document.getElementById('post-body').innerHTML = '<p>The requested post could not be found. <a href="blog.html">Return to blog</a>.</p>';
    return;
  }

  // Domain & type labels
  var DOMAIN_LABELS = {
    'detection': 'Detection Engineering', 'threat-hunting': 'Threat Hunting',
    'incident-response': 'Incident Response', 'forensics': 'Digital Forensics',
    'malware-analysis': 'Malware Analysis', 'iam-pam': 'IAM / PAM',
    'endpoint': 'Endpoint Security', 'network': 'Network Security',
    'vulnerability': 'Vuln Management', 'red-team': 'Red Team',
    'osint': 'OSINT', 'ctf': 'CTF', 'web-security': 'Web App Security',
    'privesc': 'Privilege Escalation', 'grc': 'GRC & Risk',
    'compliance': 'ISO 27001 / Compliance', 'cloud': 'Cloud Security',
    'architecture': 'Security Architecture', 'automation': 'Automation'
  };
  var TYPE_LABELS = {
    'til': '💡 TIL', 'teardown': '🔧 Tool Teardown',
    'writeup': '🚩 CTF Write-up', 'research': '📖 Research'
  };

  // Update metadata
  var postUrl = 'https://pranaymokida.xyz/post.html?slug=' + slug;
  document.getElementById('page-title').textContent = post.title + ' · Pranay Mokida';
  document.getElementById('page-desc').setAttribute('content', post.excerpt);
  document.getElementById('page-canonical').setAttribute('href', postUrl);
  document.getElementById('og-title').setAttribute('content', post.title + ' · Pranay Mokida');
  document.getElementById('og-desc').setAttribute('content', post.excerpt);
  document.getElementById('og-url').setAttribute('content', postUrl);

  // JSON-LD Article schema for SEO
  document.getElementById('post-jsonld').textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'Article',
    'headline': post.title,
    'description': post.excerpt,
    'author': { '@type': 'Person', 'name': 'Pranay Mokida', 'url': 'https://pranaymokida.xyz' },
    'publisher': { '@type': 'Person', 'name': 'Pranay Mokida' },
    'keywords': (post.tags || []).join(', '),
    'url': postUrl,
    'mainEntityOfPage': { '@type': 'WebPage', '@id': postUrl }
  });

  // Post header
  document.getElementById('post-title').textContent = post.title;
  var domainLabel = DOMAIN_LABELS[post.domain] || post.domain || '';
  var typeLabel   = TYPE_LABELS[post.type] || post.type || '';
  var diffHtml    = post.difficulty ? '<span class="post-diff post-diff--' + post.difficulty + '">' + post.difficulty + '</span>' : '';
  var domainHtml  = domainLabel ? '<span class="blog-domain-badge">' + domainLabel + '</span>' : '';
  var typeHtml    = typeLabel   ? '<span class="blog-type-badge">' + typeLabel + '</span>' : '';
  document.getElementById('post-category').innerHTML = domainHtml + typeHtml + diffHtml;
  document.getElementById('post-meta').innerHTML =
    '<span>' + post.date + '</span>' +
    '<span>' + post.readTime + '</span>' +
    (post.tags ? post.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') : '');

  // Prev / Next navigation
  const prevEl = document.getElementById('prev-post');
  const nextEl = document.getElementById('next-post');
  if (idx > 0) {
    prevEl.href = 'post.html?slug=' + BLOG_POSTS[idx - 1].slug;
    prevEl.textContent = '← ' + BLOG_POSTS[idx - 1].title.substring(0, 30) + '...';
  } else {
    prevEl.style.visibility = 'hidden';
  }
  if (idx < BLOG_POSTS.length - 1) {
    nextEl.href = 'post.html?slug=' + BLOG_POSTS[idx + 1].slug;
    nextEl.textContent = BLOG_POSTS[idx + 1].title.substring(0, 30) + '... →';
  } else {
    nextEl.style.visibility = 'hidden';
  }

  // Fetch and render markdown
  fetch('posts/' + slug + '.md')
    .then(r => {
      if (!r.ok) throw new Error('not found');
      return r.text();
    })
    .then(md => {
      document.getElementById('post-body').innerHTML = marked.parse(md);
    })
    .catch(() => {
      document.getElementById('post-body').innerHTML = `
        <p style="color:var(--muted);">
          Post content not found. Make sure <code>posts/${slug}.md</code> exists.
        </p>
      `;
    });
})();
</script>
<script src="js/main.js"></script>
</body>
