<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting… · Pranay Mokida</title>
  <!-- Redirects old ?slug= links to the new per-post HTML files -->
  <script>
    var slug = new URLSearchParams(window.location.search).get('slug');
    if (slug) {
      window.location.replace('posts/' + slug + '.html');
    } else {
      window.location.replace('blog.html');
    }
  </script>
</head>
<body>
  <p style="font-family:monospace;padding:2rem;">Redirecting…
    <a id="fallback" href="blog.html">Go to blog</a>
  </p>
  <script>
    var slug2 = new URLSearchParams(window.location.search).get('slug');
    if (slug2) document.getElementById('fallback').href = 'posts/' + slug2 + '.html';
  </script>
</body>
</html>
