<body>

<nav>

    <a href="index.html" class="nav-logo"><span>&gt;</span> PM_</a>
    <ul class="nav-links" id="nav-links">

      <button class="theme-toggle" id="theme-toggle">⬤ Dark</button>

        <span></span><span></span><span></span>

<!-- Post Hero -->
<div class="post-hero">
  <div class="container">
    <a href="blog.html" style="font-family:var(--mono);font-size:0.78rem;color:var(--muted);display:inline-flex;align-items:center;gap:0.3rem;margin-bottom:1rem;">← Back to Security Log</a>

</div>

  </div>
</article>

<!-- Post Navigation -->
<div class="container" style="padding-bottom:4rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;max-width:740px;">
  <a id="prev-post" href="blog.html" class="btn btn-outline" style="font-size:0.78rem;">← Previous</a>

  <div class="term-bar">
    <div class="term-dot term-dot-r"></div><div class="term-dot term-dot-y"></div><div class="term-dot term-dot-g"></div>
    <span class="term-title">pranay@pm-terminal ~ bash</span>
  </div>
  <div class="terminal-output" id="term-output"></div>
  <div class="terminal-input-wrap">
    <span class="term-prompt">pranay@pm ~ $</span>

  </div>
</div>
<div class="achievement-toast" id="achievement-toast">
  <div class="achievement-icon">🏆</div>
  <div class="achievement-text">
    <div class="achievement-label">Achievement Unlocked</div>
    <div class="achievement-name"></div>
  </div>
</div>

<script src="blog-data.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug || typeof BLOG_POSTS === 'undefined') {
    document.getElementById('post-title').textContent = 'Post not found';
    document.getElementById('post-body').innerHTML = '<p>The requested post could not be found. <a href="blog.html">Return to blog</a>.</p>';
    return;
  }

  const idx = BLOG_POSTS.findIndex(p => p.slug === slug);
  const post = BLOG_POSTS[idx];

  if (!post) {
    document.getElementById('post-title').textContent = 'Post not found';
    document.getElementById('post-body').innerHTML = '<p>The requested post could not be found. <a href="blog.html">Return to blog</a>.</p>';
    return;
  }

  // Update metadata
  document.getElementById('page-title').textContent = post.title + ' · Pranay Mokida';
  document.getElementById('page-desc').setAttribute('content', post.excerpt);
  document.getElementById('og-title').setAttribute('content', post.title);
  document.getElementById('og-desc').setAttribute('content', post.excerpt);
  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-category').textContent = post.category;
  document.getElementById('post-meta').innerHTML = `
    <span>${post.date}</span>
    <span>${post.readTime}</span>
    ${post.tags ? post.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''}
  `;

  // Prev / Next navigation
  const prevEl = document.getElementById('prev-post');
  const nextEl = document.getElementById('next-post');
  if (idx > 0) {
    prevEl.href = 'post.html?slug=' + BLOG_POSTS[idx - 1].slug;
    prevEl.textContent = '← ' + BLOG_POSTS[idx - 1].title.substring(0, 30) + '...';
  } else {
    prevEl.style.visibility = 'hidden';
  }
  if (idx < BLOG_POSTS.length - 1) {
    nextEl.href = 'post.html?slug=' + BLOG_POSTS[idx + 1].slug;
    nextEl.textContent = BLOG_POSTS[idx + 1].title.substring(0, 30) + '... →';
  } else {
    nextEl.style.visibility = 'hidden';
  }

  // Fetch and render markdown
  fetch('posts/' + slug + '.md')
    .then(r => {
      if (!r.ok) throw new Error('not found');
      return r.text();
    })
    .then(md => {
      document.getElementById('post-body').innerHTML = marked.parse(md);
    })
    .catch(() => {
      document.getElementById('post-body').innerHTML = `
        <p style="color:var(--muted);">
          Post content not found. Make sure <code>posts/${slug}.md</code> exists.
        </p>
      `;
    });
})();
</script>
<script src="js/main.js"></script>
</body>
</html>
